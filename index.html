<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<title>መልካም ፋሲካ 🐣</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to right, #ffecd2, #fcb69f);
  padding-top: 60px;
}

h1 { font-size: 40px; }

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #ff6f61;
  color: white;
  cursor: pointer;
  margin: 5px;
}

button:hover { background: #ff3b2f; }

#popup {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

#popup img {
  max-width: 300px;
  border-radius: 15px;
}

.firework {
  position: fixed;
  width: 5px;
  height: 5px;
  background: red;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  0% {transform: scale(1); opacity:1;}
  100% {transform: scale(20); opacity:0;}
}

textarea, input {
  width: 250px;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<h1>🐣 መልካም ፋሲካ 🐰</h1>

<button onclick="showMessage()">🎁 Open Surprise</button>

<p id="message"></p>

<!-- Popup -->
<div id="popup" onclick="closePopup()">
  <img src="your-image.jpg">
</div>

<!-- Reactions -->
<h3>React 😎</h3>
<button onclick="react('😂')">😂</button>
<button onclick="react('❤️')">❤️</button>
<button onclick="react('🔥')">🔥</button>
<p id="reactText"></p>

<hr>

<!-- Mini Game -->
<h2>🎮 Mini Game</h2>
<p>Click 10 times to unlock gift 🎁</p>

<button onclick="addScore()">Click me 😎</button>
<p id="score">Score: 0</p>

<div id="reward" style="display:none;">
  <h3>🎉 You unlocked the gift!</h3>
  <button onclick="openGift()">Open Gift 🎁</button>
</div>

<div id="gift" style="display:none;">
  <h2>💌 Surprise Unlocked</h2>
  <p>You’re officially awesome 😎🔥</p>
</div>

<hr>

<!-- FINAL FORM -->
<h2>💬 Say something nice about me 😎❤️😈</h2>

<form action="https://formspree.io/f/xgopjwva" method="POST">

  <input type="text" name="name" placeholder="Your name 👤" required><br>

  <textarea name="message" placeholder="Say something nice 💬" required></textarea><br>

  <textarea name="gift_request" placeholder="What gift do you want? 🎁❤️😈" required></textarea><br>

  <button type="submit">Send 💌</button>

</form>

<p id="thanks"></p>

<script>

function showMessage(){
  document.getElementById("message").innerText =
  "መልካም ፋሲካ 🌸 from your friend 💛";

  document.getElementById("popup").style.display = "flex";

  for(let i=0;i<10;i++){
    let fw = document.createElement("div");
    fw.className = "firework";
    fw.style.top = Math.random()*window.innerHeight + "px";
    fw.style.left = Math.random()*window.innerWidth + "px";
    document.body.appendChild(fw);

    setTimeout(()=>fw.remove(),1000);
  }
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function react(e){
  document.getElementById("reactText").innerText =
  "You reacted " + e;
}

/* GAME */
let score = 0;

function addScore(){
  score++;
  document.getElementById("score").innerText = "Score: " + score;

  if(score >= 10){
    document.getElementById("reward").style.display="block";
  }
}

function openGift(){
  document.getElementById("gift").style.display="block";
}

</script>

</body>
</html>
