<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chaos Easter Game 🎮</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
  color: white;
}

button{
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #7209b7;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#popup{
  display:none;
  position: fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<h1>እንኳን ለፋሲካ በሰላም አደረሳችሁ 🎉</h1>

<button onclick="openSurprise()">Open Surprise 🎁</button>

<div id="emojiChoices" style="display:none;">
  <button onclick="chooseEmoji('❤️')">❤️</button>
  <button onclick="chooseEmoji('🔥')">🔥</button>
  <button onclick="chooseEmoji('😂')">😂</button>
</div>

<div id="popup">
  <h2>መልካም በአል 🎉</h2>
  <p>my bestie from ዮና 💙</p>

  <!-- MESSAGE BOX -->
  <form id="introForm">
    <input name="name" placeholder="Your Name" required><br><br>
    <input name="gift" placeholder="Gift you want 🎁" required><br><br>
    <textarea name="message" placeholder="Say something for me 💬"></textarea><br><br>
    <button type="submit">Start Game 🎮</button>
  </form>

  <button onclick="closePopup()">❌</button>
</div>

<hr>

<div id="game" style="display:none;">
  <h2>Guess Number 🎮</h2>

  <input id="guessInput" type="number">
  <button onclick="checkGuess()">Guess</button>

  <p id="gameMsg"></p>
  <p id="aiMsg"></p>
  <p id="triesLeft"></p>

  <button onclick="restartGame()">🔄</button>
  <button onclick="exitGame()">❌</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let secret;
let tries;
let maxNumber = 10;

/* 🤖 AI */
let aiLow;
let aiHigh;

/* open */
window.openSurprise = function(){
  document.getElementById("emojiChoices").style.display = "block";
}

/* emoji */
window.chooseEmoji = function(choice){
  if(choice === "😂"){
    alert("choose another 😂");
    return;
  }
  document.getElementById("popup").style.display = "block";
}

/* close */
window.closePopup = function(){
  document.getElementById("popup").style.display = "none";
}

/* start */
function startGame(){
  document.getElementById("popup").style.display = "none";
  document.getElementById("game").style.display = "block";

  tries = 5;
  secret = Math.floor(Math.random()*maxNumber)+1;

  aiLow = 1;
  aiHigh = maxNumber;

  document.getElementById("gameMsg").innerText = "";
  document.getElementById("aiMsg").innerText = "";
  document.getElementById("triesLeft").innerText = "";
}

/* 🤖 AI */
function aiTurn(){
  let guess = Math.floor((aiLow + aiHigh)/2);

  if(guess === secret){
    document.getElementById("aiMsg").innerText =
    "🤖 AI WON! (" + guess + ")";
    return true;
  }

  if(guess < secret) aiLow = guess + 1;
  else aiHigh = guess - 1;

  document.getElementById("aiMsg").innerText =
  "🤖 AI guess: " + guess;

  return false;
}

/* guess */
window.checkGuess = function(){
  let guess = Number(document.getElementById("guessInput").value);

  if(!guess) return;
  if(tries <= 0) return;

  if(guess === secret){
    document.getElementById("gameMsg").innerText =
    "🎉 YOU WON!";
    return;
  }

  tries--;

  if(aiTurn()) return;

  if(tries === 0){
    document.getElementById("gameMsg").innerText =
    "💀 LOST! Number was " + secret;
  }
  else if(guess < secret){
    document.getElementById("gameMsg").innerText = "📉 Too low";
  }
  else{
    document.getElementById("gameMsg").innerText = "📈 Too high";
  }

  document.getElementById("triesLeft").innerText =
  "Tries left: " + tries;
}

/* restart */
window.restartGame = function(){
  startGame();
}

/* exit */
window.exitGame = function(){
  document.getElementById("game").style.display = "none";
}

/* ✅ SEND FORM TO YOUR FORMSPREE */
document.getElementById("introForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://formspree.io/f/xgopjwva", {
    method: "POST",
    body: new FormData(e.target),
    headers: {
      "Accept": "application/json"
    }
  });

  alert("Message sent 💙");

  startGame();
});

});
</script>

</body>
</html>
